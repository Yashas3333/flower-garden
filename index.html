<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Our Garden 🌸</title>
    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="container">
        <header class="header" id="header">
            <h1 class="logo">🌸 A little peace for You</h1>
        </header>

        <div class="name" id="nameBox">
            <span class="text-line">When the world feels too heavy...</span>
            <span class="text-highlight">I'm here for u always</span>
            <span class="text-line">✨ Tap to let the light back in</span>
        </div>

        <div class="controls">
            <button id="cleanBtn">🧹 Clear</button>
            <button id="autoBtn">✨ Auto</button>
        </div>
    </div>

    <script type="x-shader/x-vertex" id="vertexShader">
        varying vec2 vUv;
        void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
    </script>

    <script type="x-shader/x-fragment" id="fragmentShader">
        precision highp float;
        varying vec2 vUv;
        uniform float u_ratio;
        uniform vec2 u_cursor;
        uniform float u_stop_time;
        uniform float u_clean;
        uniform vec2 u_stop_randomizer;
        uniform sampler2D u_texture;

        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
        float snoise(vec2 v) {
            const vec4 C = vec4(0.211324, 0.366025, -0.577350, 0.024390);
            vec2 i = floor(v + dot(v, C.yy));
            vec2 x0 = v - i + dot(i, C.xx);
            vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
            vec4 x12 = x0.xyxy + C.xxzz; x12.xy -= i1;
            i = mod289(i);
            vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
            vec3 m = max(0.5 - vec3(dot(x0, x0), dot(x12.xy, x12.xy), dot(x12.zw, x12.zw)), 0.0);
            m = m*m; m = m*m;
            vec3 x = 2.0 * fract(p * C.www) - 1.0;
            vec3 h = abs(x) - 0.5;
            vec3 ox = floor(x + 0.5);
            vec3 a0 = x - ox;
            m *= 1.7928 - 0.8537 * (a0*a0 + h*h);
            vec3 g; g.x = a0.x * x0.x + h.x * x0.y;
            g.yz = a0.yz * x12.xz + h.yz * x12.yw;
            return 130.0 * dot(m, g);
        }

        float get_flower_shape(vec2 _p, float _pet_n, float _angle, float _outline) {
            _angle *= 3.;
            _p = vec2(_p.x * cos(_angle) - _p.y * sin(_angle), _p.x * sin(_angle) + _p.y * cos(_angle));
            float a = atan(_p.y, _p.x);
            float flower_sectoral_shape = pow(abs(sin(a * _pet_n)), .35) + .2;
            float size = 0.04 + u_stop_randomizer[0] * 0.08;
            float flower_radial_shape = pow(length(_p) / size, 1.8);
            float grow_time = step(.25, u_stop_time) * pow(u_stop_time, .25);
            return 1. - smoothstep(0., flower_sectoral_shape, _outline * flower_radial_shape / grow_time);
        }

        float get_stem_shape(vec2 _p, vec2 _uv, float _w, float _angle) {
            _w = max(.003, _w);
            _p.x -= _p.y * sin(_angle) * pow(3. * _uv.y, 2.);
            _p.x += 0.4 * snoise(2.5 * _uv * u_stop_randomizer[0]) * pow(length(_p.y), .5);
            float stem = smoothstep(-_w, 0., _p.x) * (1. - smoothstep(0., _w, _p.x));
            float grow_mask = smoothstep(0., pow(1. - smoothstep(0., .18, u_stop_time), .45), .035 - _p.y);
            return stem * grow_mask * (1. - step(.17, u_stop_time));
        }

        void main() {
            vec3 base = texture2D(u_texture, vUv).xyz;
            vec2 uv = vUv; uv.x *= u_ratio;
            vec2 cursor = vUv - u_cursor; cursor.x *= u_ratio;
            float color_type = floor(u_stop_randomizer[1] * 4.0);
            vec3 f_col = (color_type < 1.) ? vec3(.98, .7, .75) : (color_type < 2.) ? vec3(.95, .6, .3) : (color_type < 3.) ? vec3(.75, 0.4, .9) : vec3(.4, .8, .9);
            float stem = get_stem_shape(cursor, vUv, .004, .5 * (u_stop_randomizer[0] - .5));
            float flower = get_flower_shape(cursor, 5. + floor(u_stop_randomizer[1]*3.), u_stop_randomizer[0]*6., 1.0);
            vec3 color = base * (1.0 - stem) + (stem * vec3(.2, .5, .2));
            color = color * (1.0 - flower) + (flower * f_col);
            gl_FragColor = vec4(color * u_clean, 1.0);
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
