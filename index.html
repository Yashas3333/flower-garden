<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flower Garden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #ff8fa3;
            --ui-glass: rgba(255, 255, 255, 0.1);
            --ui-border: rgba(255, 255, 255, 0.2);
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            overflow: hidden; 
            background-color: var(--bg-color); 
            font-family: var(--font-sans); 
            color: var(--text-color);
            height: 100%;
            width: 100%;
            touch-action: none;
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; z-index: 0; }

        .container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            pointer-events: none;
        }

        .header { position: absolute; top: 2rem; left: 2rem; z-index: 10; transition: opacity 1s ease; }
        .logo { font-family: var(--font-serif); font-size: 1.2rem; font-weight: 600; opacity: 0; animation: fadeInDown 1s ease-out 0.5s forwards; }

        .name { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; z-index: 5; display: flex; flex-direction: column; 
            align-items: center; gap: 0.5rem; transition: opacity 1s ease, transform 1s ease; 
            width: 90%;
        }

        .text-line { font-size: 1.2rem; font-weight: 300; opacity: 0; animation: fadeInUp 1s ease-out 0.2s forwards; }
        .text-highlight { 
            font-family: var(--font-serif); font-size: 3rem; font-weight: 600; 
            background: linear-gradient(45deg, #ffb7c5, #ff9e6d, #d1b3ff, #87ceeb); 
            -webkit-background-clip: text; background-clip: text; color: transparent; 
            opacity: 0; animation: fadeInUp 1s ease-out 0.4s forwards; 
        }

        .controls { 
            position: absolute; bottom: 3rem; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 1rem; z-index: 20; opacity: 0; animation: fadeInUp 1s ease-out 0.8s forwards; 
            background: rgba(255, 255, 255, 0.05); border-radius: 60px; backdrop-filter: blur(5px); 
            padding: 0.6rem; pointer-events: auto;
        }

        button { 
            background: var(--ui-glass); border: 1px solid var(--ui-border); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); 
            padding: 0.7rem 1.4rem; border-radius: 50px; font-family: var(--font-sans); 
            font-size: 0.9rem; color: #ffffff; cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); 
            display: flex; align-items: center; gap: 0.5rem;
        }
        
        button.active { background: #ffb7c5; color: #000; }

        .fade-out { opacity: 0 !important; pointer-events: none; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translate3d(-50%, 30px, 0); } to { opacity: 1; transform: translate3d(-50%, 0, 0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translate3d(0, -30px, 0); } to { opacity: 1; transform: translate3d(0, 0, 0); } }

        @media screen and (max-width: 768px) {
            .text-highlight { font-size: 2.2rem; }
            button { padding: 0.6rem 1rem; min-width: 100px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="container">
        <header class="header" id="header">
            <h1 class="logo">🌸 A Little Peace for u Baby</h1>
        </header>
        <div class="name" id="nameBox">
            <span class="text-line">when the world feels heavy...</span>
            <span class="text-highlight">I'm here for u Always</span>
            <span class="text-line">✨ Tap to plant flowers</span>
        </div>
        <div class="controls">
            <button id="cleanBtn">🧹 Clear</button>
            <button id="autoBtn">✨ Auto</button>
        </div>
    </div>

    <script type="x-shader/x-vertex" id="vertexShader">
        varying vec2 vUv;
        void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
    </script>

    <script type="x-shader/x-fragment" id="fragmentShader">
        precision highp float;
        varying vec2 vUv;
        uniform float u_ratio;
        uniform vec2 u_cursor;
        uniform float u_stop_time;
        uniform float u_clean;
        uniform vec2 u_stop_randomizer;
        uniform sampler2D u_texture;

        float get_flower_shape(vec2 _p, float _pet_n, float _angle, float _outline) {
            _angle *= 3.;
            _p = vec2(_p.x * cos(_angle) - _p.y * sin(_angle), _p.x * sin(_angle) + _p.y * cos(_angle));
            float a = atan(_p.y, _p.x);
            float flower_sectoral_shape = pow(abs(sin(a * _pet_n)), .35) + .2;
            float size = 0.05 + u_stop_randomizer[0] * 0.1;
            float flower_radial_shape = pow(length(_p) / size, 1.8);
            float grow_time = step(.25, u_stop_time) * pow(u_stop_time, .25);
            return 1. - smoothstep(0., flower_sectoral_shape, _outline * flower_radial_shape / grow_time);
        }

        void main() {
            vec3 base = texture2D(u_texture, vUv).xyz;
            vec2 uv = vUv; uv.x *= u_ratio;
            vec2 cursor = vUv - u_cursor; cursor.x *= u_ratio;

            float color_type = floor(u_stop_randomizer[1] * 4.0);
            vec3 flower_color;
            if (color_type < 1.0) flower_color = vec3(0.98, 0.71, 0.77); // Soft Pink
            else if (color_type < 2.0) flower_color = vec3(0.95, 0.60, 0.30); // Sunset Orange
            else if (color_type < 3.0) flower_color = vec3(0.75, 0.60, 0.90); // Lavender
            else flower_color = vec3(0.40, 0.80, 0.90); // Sky Blue

            float flower = get_flower_shape(cursor, 5.0 + floor(u_stop_randomizer[0] * 3.0), u_stop_randomizer[0] * 6.28, 1.0);
            vec3 color = base * (1.0 - flower * 1.5) + (flower * flower_color);
            gl_FragColor = vec4(color * u_clean, 1.0);
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const canvasEl = document.querySelector('#canvas');
        const cleanBtn = document.querySelector('#cleanBtn');
        const autoBtn = document.querySelector('#autoBtn');
        const nameBox = document.querySelector('#nameBox');
        const header = document.querySelector('#header');

        let isClean = true, isAuto = false, autoInterval;
        const pointer = { x: 0.5, y: 0.5, clicked: false, clean: 1.0 };

        const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const sceneShader = new THREE.Scene(), sceneBasic = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const clock = new THREE.Clock();

        let targets = [
            new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight),
            new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight)
        ];

        const shaderMat = new THREE.ShaderMaterial({
            uniforms: {
                u_ratio: { value: window.innerWidth / window.innerHeight },
                u_cursor: { value: new THREE.Vector2(0.5, 0.5) },
                u_stop_time: { value: 0 },
                u_clean: { value: 1.0 },
                u_stop_randomizer: { value: new THREE.Vector2(Math.random(), Math.random()) },
                u_texture: { value: null }
            },
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent
        });

        const plane = new THREE.PlaneGeometry(2, 2);
        sceneShader.add(new THREE.Mesh(plane, shaderMat));
        const basicMat = new THREE.MeshBasicMaterial();
        sceneBasic.add(new THREE.Mesh(plane, basicMat));

        function handleInput(x, y) {
            if (isClean) {
                nameBox.classList.add('fade-out');
                header.classList.add('fade-out');
                isClean = false;
            }
            pointer.x = x / window.innerWidth;
            pointer.y = 1 - (y / window.innerHeight);
            pointer.clicked = true;
        }

        window.addEventListener('mousedown', e => { if(!e.target.closest('button')) handleInput(e.clientX, e.clientY); });
        window.addEventListener('touchstart', e => { if(!e.target.closest('button')) handleInput(e.touches[0].clientX, e.touches[0].clientY); });

        cleanBtn.onclick = () => {
            pointer.clean = 0.0;
            setTimeout(() => { 
                pointer.clean = 1.0; isClean = true;
                nameBox.classList.remove('fade-out'); header.classList.remove('fade-out');
            }, 100);
        };

        autoBtn.onclick = () => {
            isAuto = !isAuto;
            autoBtn.classList.toggle('active');
            if (isAuto) {
                autoInterval = setInterval(() => handleInput(Math.random()*window.innerWidth, Math.random()*window.innerHeight), 400);
            } else clearInterval(autoInterval);
        };

        function animate() {
            shaderMat.uniforms.u_clean.value = pointer.clean;
            shaderMat.uniforms.u_texture.value = targets[0].texture;
            if (pointer.clicked) {
                shaderMat.uniforms.u_cursor.value.set(pointer.x, pointer.y);
                shaderMat.uniforms.u_stop_randomizer.value.set(Math.random(), Math.random());
                shaderMat.uniforms.u_stop_time.value = 0;
                pointer.clicked = false;
            }
            shaderMat.uniforms.u_stop_time.value += clock.getDelta();
            renderer.setRenderTarget(targets[1]);
            renderer.render(sceneShader, camera);
            basicMat.map = targets[1].texture;
            renderer.setRenderTarget(null);
            renderer.render(sceneBasic, camera);
            let tmp = targets[0]; targets[0] = targets[1]; targets[1] = tmp;
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            shaderMat.uniforms.u_ratio.value = window.innerWidth / window.innerHeight;
            targets[0].setSize(window.innerWidth, window.innerHeight);
            targets[1].setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
