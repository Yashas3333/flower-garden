<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Little Peace for You 🌸</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #ff8fa3;
            --ui-glass: rgba(255, 255, 255, 0.1);
            --ui-border: rgba(255, 255, 255, 0.2);
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            overflow: hidden;
            background-color: #000;
            font-family: var(--font-sans);
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            touch-action: none;
        }

        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

        .container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .header {
            position: absolute; top: 2rem; left: 2rem;
            pointer-events: none; z-index: 10; transition: opacity 1s ease;
        }

        .logo {
            font-family: var(--font-serif); font-size: 1.5rem; font-weight: 600;
            opacity: 0; animation: fadeInDown 1s ease-out 0.5s forwards;
        }

        .name {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; pointer-events: none; z-index: 5;
            display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
            transition: opacity 1s ease, transform 1s ease; width: 90%;
        }

        .text-line { font-size: 1.2rem; font-weight: 300; opacity: 0; animation: fadeInUp 1s ease-out 0.2s forwards; }

        .text-highlight {
            font-family: var(--font-serif); font-size: 3.2rem; font-weight: 600;
            background: linear-gradient(45deg, #ff8fa3, #a29bfe, #74b9ff, #fab1a0);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            opacity: 0; animation: fadeInUp 1s ease-out 0.4s forwards;
        }

        .controls {
            position: absolute; bottom: 3rem; left: 50%; transform: translateX(-50%);
            display: flex; gap: 1rem; z-index: 20; opacity: 0;
            animation: fadeInUp 1s ease-out 0.8s forwards;
        }

        button {
            background: var(--ui-glass); border: 1px solid var(--ui-border);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 0.8rem 1.8rem; border-radius: 50px;
            font-family: var(--font-sans); font-size: 0.95rem; font-weight: 500;
            color: var(--text-color); cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex; align-items: center; gap: 0.6rem; min-width: 140px; justify-content: center;
        }

        button:hover { transform: translateY(-4px); background: rgba(255, 255, 255, 0.2); }
        button:active { transform: translateY(-1px) scale(0.98); }
        button.active { background: var(--accent-color); border-color: var(--accent-color); box-shadow: 0 8px 20px rgba(255, 107, 107, 0.3); }

        .fade-out { opacity: 0 !important; pointer-events: none; }

        @keyframes fadeInUp { from { opacity: 0; transform: translate3d(-50%, 30px, 0); } to { opacity: 1; transform: translate3d(-50%, 0, 0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translate3d(0, -30px, 0); } to { opacity: 1; transform: translate3d(0, 0, 0); } }

        @media screen and (max-width: 768px) {
            .text-highlight { font-size: 2.2rem; }
            button { min-width: 110px; padding: 0.7rem 1rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <canvas id="canvas"></canvas>
        <header class="header" id="header"><h1 class="logo">🌸 A Little peace for u Baby</h1></header>
        <div class="name" id="nameBox">
            <span class="text-line">when the world feels heavy...</span>
            <span class="text-highlight">I'm here for u Always</span>
            <span class="text-line">✨ Tap to let the light back in</span>
        </div>
        <div class="controls">
            <button id="cleanBtn"><span class="btn-icon">🧹</span> Clear</button>
            <button id="autoBtn"><span class="btn-icon">✨</span> Auto Bloom</button>
        </div>
    </div>

    <script type="x-shader/x-vertex" id="vertexShader">
        varying vec2 vUv;
        void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
    </script>

    <script type="x-shader/x-fragment" id="fragmentShader">
        precision highp float;
        varying vec2 vUv;
        uniform float u_ratio;
        uniform vec2 u_cursor;
        uniform float u_stop_time;
        uniform float u_clean;
        uniform vec2 u_stop_randomizer;
        uniform sampler2D u_texture;

        float get_flower_shape(vec2 _p, float _pet_n, float _angle, float _outline) {
            _angle *= 3.;
            _p = vec2(_p.x * cos(_angle) - _p.y * sin(_angle), _p.x * sin(_angle) + _p.y * cos(_angle));
            float a = atan(_p.y, _p.x);
            float flower_sectoral_shape = pow(abs(sin(a * _pet_n)), .35) + .2;
            float size = 0.05 + u_stop_randomizer[0] * 0.1;
            float flower_radial_shape = pow(length(_p) / size, 1.8);
            float grow_time = step(.25, u_stop_time) * pow(u_stop_time, .25);
            return 1. - smoothstep(0., flower_sectoral_shape, _outline * flower_radial_shape / grow_time);
        }

        float get_stem_shape(vec2 _p, vec2 _uv, float _w, float _angle) {
            _p.x -= _p.y * sin(_angle) * pow(3. * _uv.y, 2.0);
            float stem_shape = smoothstep(-_w, 0., _p.x) * (1. - smoothstep(0., _w, _p.x));
            return stem_shape * (smoothstep(0., 0.1, .035 -_p.y)) * (1. - step(.17, u_stop_time));
        }

        void main() {
            vec3 base = texture2D(u_texture, vUv).xyz;
            vec2 uv = vUv; uv.x *= u_ratio;
            vec2 cursor = vUv - u_cursor; cursor.x *= u_ratio;

            float color_type = floor(u_stop_randomizer[1] * 4.0);
            vec3 flower_color;
            if (color_type < 1.0) flower_color = vec3(.98, .70, .75); // Soft Pink
            else if (color_type < 2.0) flower_color = vec3(.75, .60, .90); // Lavender
            else if (color_type < 3.0) flower_color = vec3(.4, .8, .9); // Sky Blue
            else flower_color = vec3(.95, .60, .30); // Sunset Orange

            float angle = .5 * (u_stop_randomizer[0] - .5);
            float stem = get_stem_shape(cursor, uv, .004, angle);
            float flower = get_flower_shape(cursor, 5.0 + floor(u_stop_randomizer[0]*3.0), angle, 1.0);

            vec3 color = base * (1.0 - flower * 1.5);
            color += (stem * vec3(.2, .4, .2));
            color += (flower * flower_color);
            gl_FragColor = vec4(color * u_clean, 1.0);
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const canvasEl = document.querySelector('#canvas');
        const cleanBtn = document.querySelector('#cleanBtn');
        const autoBtn = document.querySelector('#autoBtn');
        const nameEl = document.querySelector('#nameBox');
        const headerEl = document.querySelector('#header');

        let isClean = true, isAutoBloom = false, autoBloomInterval = null;
        const pointer = { x: 0.5, y: 0.5, clicked: false, vanishCanvas: false };

        let renderer = new THREE.WebGLRenderer({ canvas: canvasEl, alpha: true, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);

        let sceneShader = new THREE.Scene(), sceneBasic = new THREE.Scene();
        let camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 10);
        let clock = new THREE.Clock();

        let renderTargets = [
            new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight),
            new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight)
        ];

        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                u_stop_time: { value: 0 },
                u_stop_randomizer: { value: new THREE.Vector2(Math.random(), Math.random()) },
                u_cursor: { value: new THREE.Vector2(0.5, 0.5) },
                u_ratio: { value: window.innerWidth / window.innerHeight },
                u_texture: { value: null },
                u_clean: { value: 1 }
            },
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            transparent: true
        });

        const basicMaterial = new THREE.MeshBasicMaterial();
        const planeGeometry = new THREE.PlaneGeometry(2, 2);
        sceneBasic.add(new THREE.Mesh(planeGeometry, basicMaterial));
        sceneShader.add(new THREE.Mesh(planeGeometry, shaderMaterial));

        function handleInteraction() {
            if (isClean) {
                nameEl.classList.add('fade-out');
                headerEl.classList.add('fade-out');
                isClean = false;
            }
        }

        window.addEventListener('mousedown', e => {
            if (e.target.closest('button')) return;
            handleInteraction();
            pointer.x = e.clientX / window.innerWidth;
            pointer.y = e.clientY / window.innerHeight;
            pointer.clicked = true;
        });

        window.addEventListener('touchstart', e => {
            if (e.target.closest('button')) return;
            handleInteraction();
            pointer.x = e.targetTouches[0].clientX / window.innerWidth;
            pointer.y = e.targetTouches[0].clientY / window.innerHeight;
            pointer.clicked = true;
        }, { passive: false });

        cleanBtn.addEventListener('click', () => {
            pointer.vanishCanvas = true;
            setTimeout(() => { 
                pointer.vanishCanvas = false; 
                isClean = true;
                nameEl.classList.remove('fade-out');
                headerEl.classList.remove('fade-out');
            }, 50);
        });

        autoBtn.addEventListener('click', () => {
            isAutoBloom = !isAutoBloom;
            autoBtn.classList.toggle('active');
            if (isAutoBloom) {
                handleInteraction();
                autoBloomInterval = setInterval(() => {
                    pointer.x = Math.random(); pointer.y = Math.random(); pointer.clicked = true;
                }, 400);
            } else { clearInterval(autoBloomInterval); }
        });

        function render() {
            shaderMaterial.uniforms.u_clean.value = pointer.vanishCanvas ? 0 : 1;
            shaderMaterial.uniforms.u_texture.value = renderTargets[0].texture;
            if (pointer.clicked) {
                shaderMaterial.uniforms.u_cursor.value.set(pointer.x, 1 - pointer.y);
                shaderMaterial.uniforms.u_stop_randomizer.value.set(Math.random(), Math.random());
                shaderMaterial.uniforms.u_stop_time.value = 0;
                pointer.clicked
